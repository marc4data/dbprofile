# dbprofile — Snowflake: analytics.dbt_malex_marts
#
# CREDENTIALS — set these environment variables before running:
#
#   export SNOWFLAKE_ACCOUNT=<account-identifier>
#     Format: <org>-<account>  (e.g. myorg-xy12345)
#     Find in: Snowflake UI → bottom-left account name → "Copy account identifier"
#
#   export SNOWFLAKE_USER=<your-username>
#   export SNOWFLAKE_PASSWORD=<your-password>
#
#   export SNOWFLAKE_WAREHOUSE=<warehouse-name>   # e.g. COMPUTE_WH, TRANSFORMING
#   export SNOWFLAKE_ROLE=<role-name>             # e.g. TRANSFORMER, ANALYST, SYSADMIN
#
# Then run:
#   dbprofile run --config examples/config_snowflake_marts.yaml
#
# Or override sampling at the CLI without editing this file:
#   dbprofile run --config examples/config_snowflake_marts.yaml \
#                 --sample-rate 0.05 --sample-method system

connection:
  dialect: snowflake
  account:   ${SNOWFLAKE_ACCOUNT}
  user:      ${SNOWFLAKE_USER}
  password:  ${SNOWFLAKE_PASSWORD}
  warehouse: ${SNOWFLAKE_WAREHOUSE}
  role:      ${SNOWFLAKE_ROLE}      # comment out this line if not using a specific role

scope:
  database: analytics
  schemas:
    - dbt_malex_marts
  # tables:            # uncomment + list names to profile only specific tables
  #   - dim_customers
  #   - fct_orders
  exclude_tables: []   # add table names here to skip them

checks:
  enabled: [all]
  disabled: []
  # sample_rate: fraction of rows to sample (0.0 < rate <= 1.0)
  #   1.0 = full scan (accurate but slow on large marts tables)
  #   0.10 = 10% sample (good starting point for most marts)
  #   0.05 = 5% sample (faster, use for very large tables)
  sample_rate: 0.10
  # sample_method controls HOW rows are selected when sample_rate < 1.0:
  #   bernoulli — each row independently included with probability p
  #               statistically uniform; good default for marts profiling
  #   system    — Snowflake samples whole micro-partitions (blocks)
  #               much faster on large tables; slightly less uniform
  sample_method: bernoulli

report:
  output: ./reports/snowflake_marts_profile.html
  include: [tables, charts]
  thresholds:
    null_pct_warn: 5
    null_pct_critical: 20
    duplicate_pct_warn: 0.001
    duplicate_pct_critical: 0.01
    outlier_pct_warn: 1
    outlier_pct_critical: 5
    frequency_cardinality_limit: 200
